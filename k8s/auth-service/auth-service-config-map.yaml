apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: notes-cloud
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: notes-cloud-platform
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "notes_cloud_user"
  DB_NAME: "notes_cloud"
  DB_SSLMODE: "disable"
  JWT_ISSUER: "notes-cloud"
  JWT_AUDIENCE: "notes-cloud"
  JWT_TTL: "15m"
