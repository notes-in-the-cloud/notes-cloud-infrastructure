apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: notes-cloud
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: notes-cloud-platform
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "notes_cloud_user"
  DB_NAME: "notes_cloud"
  DB_SSLMODE: "disable"
  JWT_ISSUER: "notes-cloud"
  JWT_AUDIENCE: "notes-cloud"
  JWT_TTL: "15m"

  # ----- Auth providers -----
  # Convention: OIDC_<PROVIDER_NAME>_<FIELD>
  # Adding a new provider = add a new block here + matching keys in the Secret.
  # No code changes required.

  # Google (OIDC)
  OIDC_GOOGLE_ENABLED: "true"
  OIDC_GOOGLE_PROVIDER_TYPE: "google"
  OIDC_GOOGLE_ISSUER_URL: "https://accounts.google.com"
  OIDC_GOOGLE_REDIRECT_URL: "http://localhost:8081/authService/api/v1/auth/google/callback"
  OIDC_GOOGLE_SCOPES: "openid,email,profile"

  # GitLab (OIDC)
  OIDC_GITLAB_ENABLED: "true"
  OIDC_GITLAB_PROVIDER_TYPE: "gitlab"
  OIDC_GITLAB_ISSUER_URL: "https://gitlab.com"
  OIDC_GITLAB_REDIRECT_URL: "http://localhost:8081/authService/api/v1/auth/gitlab/callback"
  OIDC_GITLAB_SCOPES: "openid,email,profile"

  # ----- Email service -----
  RESEND_FROM_EMAIL: "onboarding@resend.dev"