apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: notes-cloud
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: notes-cloud-platform
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP